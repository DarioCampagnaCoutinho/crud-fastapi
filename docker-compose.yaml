version: "3.8"
services:

  db:
    image: mysql:8.0
    environment:
        MYSQL_ROOT_PASSWORD: root123
        MYSQL_DATABASE: crud_db
        MYSQL_USER: user
        MYSQL_PASSWORD: user123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://user:password123@db:3306/crud_db

volumes:
  mysql_data:
